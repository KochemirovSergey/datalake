    source_filter: "Население"

    region:
      location: "meta_sheet"
      quarantine_sheets:
        "2.2.3": "aggregate ARK+NEN: Архангельская область включая НАО — НАО учитывается отдельно"
        "2.6.3": "aggregate TYU+KHM+YAN: Тюменская область включая ХМАО и ЯНАО — они учитываются отдельно"

    year:
      location: "bronze_field"
      year_type: "period"

    education_level:
      required: false

